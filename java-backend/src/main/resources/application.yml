server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: personal-blog-rag-backend

app:
  api-prefix: ${API_PREFIX:/api/v1}
  blog-title: ${BLOG_TITLE:My Personal Blog}
  rag:
    enabled: ${RAG_ENABLED:false}
    top-k: ${RAG_TOP_K:3}
    retrieval-url: ${RAG_RETRIEVAL_URL:}
    llm-url: ${RAG_LLM_URL:}
    api-key: ${RAG_API_KEY:}
