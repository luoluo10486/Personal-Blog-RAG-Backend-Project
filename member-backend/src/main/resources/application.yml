server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: personal-blog-member-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:memberdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:3s}

sa-token:
  token-name: ${SA_TOKEN_NAME:Authorization}
  token-prefix: ${SA_TOKEN_PREFIX:Bearer}
  is-read-header: true
  is-read-body: true
  is-read-cookie: false

mybatis-plus:
  enable-logic-delete: ${MYBATIS_PLUS_ENABLE_LOGIC_DELETE:true}
  global-config:
    db-config:
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  api-prefix: ${API_PREFIX:/api/v1}
  member:
    auth:
      session-ttl-seconds: ${MEMBER_AUTH_SESSION_TTL_SECONDS:86400}
      allow-mock-verify-code: ${MEMBER_AUTH_ALLOW_MOCK_VERIFY_CODE:true}
      mock-verify-code: ${MEMBER_AUTH_MOCK_VERIFY_CODE:123456}
      allow-plain-password: ${MEMBER_AUTH_ALLOW_PLAIN_PASSWORD:true}
