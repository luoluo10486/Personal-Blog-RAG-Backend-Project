server:
  port: 9090
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent${unique-name:}-service
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  sql:
    init:
      mode: never
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ragent?client_encoding=UTF8}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool
  mail:
    host: smtp.qq.com
    port: 465
    username: 2130265486@qq.com
    password: ${SPRING_MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false
          ssl:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:123456}
      database: 0
      timeout: 3s

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: ragent-producer${unique-name:}_pg
    send-message-timeout: 2000

milvus:
  uri: http://localhost:19530

ai:
  providers:
    ollama:
      type: ollama
      base-url: http://localhost:11434
      api-key: ""
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
        rerank: /v1/rerank
    bailian:
      type: bailian
      base-url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        embedding: /v1/embeddings
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    siliconflow:
      type: siliconflow
      base-url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
        rerank: /v1/rerank
  selection:
    failure-threshold: 2
    open-duration-ms: 30000
  stream:
    message-chunk-size: 1
  chat:
    default-model: qwen3-max
    deep-thinking-model: qwen3-max
    candidates:
      - id: qwen-plus
        provider: bailian
        model: qwen-plus-latest
        priority: 1
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true
        priority: 3
      - id: glm-4.7
        provider: siliconflow
        model: Pro/zai-org/GLM-4.7
        supports-thinking: true
        priority: 0
      - id: qwen3-local
        provider: ollama
        model: qwen3:8b-fp16
        priority: 2
  embedding:
    default-model: qwen-emb-8b
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: ${rag.default.dimension}
        priority: 1
      - id: qwen-emb-local
        provider: ollama
        model: qwen3-embedding:8b-fp16
        dimension: ${rag.default.dimension}
        priority: 2
  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

rag:
  vector:
    type: pg
  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
    sse-timeout-ms: 300000
  query-rewrite:
    enabled: true
  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200
  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    summary-max-chars: 200
    title-max-length: 30
  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300
  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60
  mcp:
    servers:
      - name: default
        url: http://localhost:9099
  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2
  trace:
    enabled: true
    max-error-length: 1000

app:
  demo-mode: false
  member:
    auth:
      session-ttl-seconds: 86400
      verify-code-ttl-seconds: 120
      verify-code-send-interval-seconds: 60
      image-captcha-ttl-seconds: 120
      image-captcha-length: 4
      image-captcha-enabled: true
      plain-verify-code-log-enabled: true
      allow-mock-verify-code: false
      mock-verify-code: 123456
      allow-plain-password: true
    sms:
      aliyun:
        enabled: false
        access-key-id: ""
        access-key-secret: ""
        region-id: cn-hangzhou
        endpoint: dysmsapi.aliyuncs.com
        sign-name: ""
        login-template-code: ""
        code-param-name: code
        ttl-minutes-param-name: ttl
    email:
      login-subject: Login verification code
      login-content-template: "Your verification code is %s. It is valid for %d minutes."
  knowledge:
    enabled: true
    default-base-code: default
    storage:
      bucket-prefix: knowledge
    jdbc:
      enabled: true
    vector:
      type: pgvector
      pg:
        enabled: true
        schema: public
        table-name: t_knowledge_vector
        collection-prefix: kb_
    defaults:
      collection-name: default
      dimension: 1536
      metric-type: COSINE
      embedding-model: Qwen/Qwen3-Embedding-8B
      chat-model: Qwen/Qwen3-32B
      rerank-model: BAAI/bge-reranker-v2-m3
    chunking:
      strategy: structure-aware
      chunk-size: 800
      chunk-overlap: 120
      max-chunk-count: 1000
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60
    search:
      top-k: 8
      top-k-multiplier: 3
      confidence-threshold: 0.6
      rrf-k: 60
      rerank:
        enabled: true
        provider: demo
    mcp:
      enabled: true
      server-url: http://127.0.0.1:9099
      connect-timeout-ms: 3000
      read-timeout-ms: 10000
      parameter-extraction-enabled: true
    trace:
      enabled: true
      max-error-length: 1000
    providers:
      - id: siliconflow
        type: siliconflow
        base-url: https://api.siliconflow.cn
        api-key: ${SILICONFLOW_API_KEY:}
        endpoints:
          chat: /v1/chat/completions
          embedding: /v1/embeddings
          rerank: /v1/rerank
      - id: ollama
        type: ollama
        base-url: http://localhost:11434
        endpoints:
          chat: /v1/chat/completions
          embedding: /api/embed
          rerank: /v1/rerank

