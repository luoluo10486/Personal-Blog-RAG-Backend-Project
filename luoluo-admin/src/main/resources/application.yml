server:
  port: 8080

spring:
  application:
    name: luoluo-admin
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:mysql://localhost:3306/personnal-blog?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: smtp.qq.com
    port: 465
    username: 2130265486@qq.com
    password: ${SPRING_MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          # 是否启用 SMTP 身份认证
          auth: true
          starttls:
            # 是否启用 STARTTLS
            enable: false
          ssl:
            # 是否启用 SSL 直连
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 3s

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  # 是否允许从请求头读取 token
  is-read-header: true
  # 是否允许从请求体读取 token
  is-read-body: true
  # 是否允许从 Cookie 读取 token
  is-read-cookie: false

mybatis-plus:
  # 是否启用逻辑删除
  enable-logic-delete: true
  global-config:
    db-config:
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  api-prefix: /api/v1
  blog-title: My Personal Blog
  ai:
    enabled: true
    connect-timeout-seconds: 30
    read-timeout-seconds: 60
    providers:
      siliconflow:
        type: siliconflow
        base-url: https://api.siliconflow.cn
        api-key: ${SILICONFLOW_API_KEY:}
        endpoints:
          chat: /v1/chat/completions
          embedding: /v1/embeddings
          rerank: /v1/rerank
      ollama:
        type: ollama
        base-url: http://localhost:11434
        api-key: ""
        endpoints:
          chat: /v1/chat/completions
          embedding: /api/embed
          rerank: /v1/rerank
    chat:
      default-model: siliconflow-chat
      deep-thinking-model: siliconflow-chat
      candidates:
        - id: siliconflow-chat
          provider: siliconflow
          model: Qwen/Qwen3-32B
          priority: 10
          supports-thinking: true
        - id: ollama-chat
          provider: ollama
          model: qwen3:8b
          priority: 50
          enabled: false
    embedding:
      default-model: siliconflow-embedding
      candidates:
        - id: siliconflow-embedding
          provider: siliconflow
          model: Qwen/Qwen3-Embedding-8B
          dimension: 1536
          priority: 10
        - id: ollama-embedding
          provider: ollama
          model: nomic-embed-text
          dimension: 768
          priority: 50
          enabled: false
    rerank:
      default-model: noop-rerank
      candidates:
        - id: noop-rerank
          provider: noop
          model: noop
          priority: 100
        - id: siliconflow-rerank
          provider: siliconflow
          model: BAAI/bge-reranker-v2-m3
          priority: 10
          enabled: false
    selection:
      failure-threshold: 2
      open-duration-ms: 30000
    stream:
      message-chunk-size: 5
      executor-threads: 4
  rag:
    # 该段配置保留给 luoluo-rag Demo 模块；当前正式链路请优先使用 app.knowledge.*
    # 是否启用 RAG 功能
    enabled: true
    # embedding 生成模式：demo / siliconflow
    embedding-provider: demo
    api-url: https://api.siliconflow.cn/v1/chat/completions
    embedding-api-url: https://api.siliconflow.cn/v1/embeddings
    api-key: ${SILICONFLOW_API_KEY:}
    model: Qwen/Qwen3-32B
    embedding-model: Qwen/Qwen3-Embedding-8B
    temperature: 0
    max-tokens: 1024
    connect-timeout-seconds: 30
    read-timeout-seconds: 60
    demo-embedding-dimension: 64
    system-prompt: You are a professional ecommerce support assistant. Keep answers concise.
    retrieval:
      mode: HYBRID
      dense-recall-top-k: 12
      sparse-recall-top-k: 12
      nprobe: 16
      drop-ratio-search: 0.2
      rrf-k: 60
      consistency-level: BOUNDED
    rerank:
      enabled: true
      # demo / siliconflow
      provider: demo
      api-url: https://api.siliconflow.cn/v1/rerank
      model: BAAI/bge-reranker-v2-m3
    milvus:
      enabled: true
      uri: http://127.0.0.1:19530
      token: ""
      database-name: ""
      collection-name: rag_demo_chunks
  knowledge:
    # 正式知识库配置；当前 luoluo-admin 与 luoluo-rag-mcp 都走这套链路
    enabled: true
    default-base-code: default
    jdbc:
      # 当前正式检索默认先走 JDBC 检索器；关闭后会回退到空检索实现
      enabled: true
    vector:
      # 可选：milvus / pg，当前主要用于正式链路的向量空间命名与后续扩展
      type: milvus
      milvus:
        enabled: true
        uri: http://127.0.0.1:19530
        token: ""
        database-name: ""
        collection-prefix: kb_
        consistency-level: BOUNDED
        nprobe: 16
      pg:
        enabled: false
        schema: public
        table-name: knowledge_chunk_vector
    defaults:
      collection-name: knowledge_default_store
      dimension: 1536
      metric-type: COSINE
      embedding-model: Qwen/Qwen3-Embedding-8B
      chat-model: Qwen/Qwen3-32B
      rerank-model: BAAI/bge-reranker-v2-m3
    chunking:
      strategy: structure-aware
      chunk-size: 800
      chunk-overlap: 120
      max-chunk-count: 1000
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60
    search:
      top-k: 8
      top-k-multiplier: 3
      confidence-threshold: 0.6
      rrf-k: 60
      rerank:
        enabled: true
        provider: demo
    trace:
      enabled: true
      max-error-length: 1000
    providers:
      - id: siliconflow
        type: siliconflow
        base-url: https://api.siliconflow.cn
        api-key: ${SILICONFLOW_API_KEY:}
        endpoints:
          chat: /v1/chat/completions
          embedding: /v1/embeddings
          rerank: /v1/rerank
      - id: ollama
        type: ollama
        base-url: http://localhost:11434
        endpoints:
          chat: /v1/chat/completions
          embedding: /api/embed
          rerank: /v1/rerank
  member:
    auth:
      session-ttl-seconds: 86400
      verify-code-ttl-seconds: 120
      verify-code-send-interval-seconds: 60
      image-captcha-ttl-seconds: 120
      image-captcha-length: 4
      # 是否启用图形验证码校验
      image-captcha-enabled: true
      # 是否打印验证码明文日志
      plain-verify-code-log-enabled: true
      # 是否允许返回 mock 验证码
      allow-mock-verify-code: false
      mock-verify-code: 123456
      # 是否允许明文密码兼容登录
      allow-plain-password: true
    sms:
      aliyun:
        # 是否启用阿里云短信发送
        enabled: false
        access-key-id: ""
        access-key-secret: ""
        region-id: cn-hangzhou
        endpoint: dysmsapi.aliyuncs.com
        sign-name: ""
        login-template-code: ""
        code-param-name: code
        ttl-minutes-param-name: ttl
    email:
      login-subject: Login verification code
      login-content-template: "Your verification code is %s. It is valid for %d minutes."
