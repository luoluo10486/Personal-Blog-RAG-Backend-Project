server:
  port: 8080

spring:
  application:
    name: luoluo-admin
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:mysql://localhost:3306/personnal-blog?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: smtp.qq.com
    port: 465
    username: 2130265486@qq.com
    password: ${SPRING_MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          # 是否启用 SMTP 身份认证
          auth: true
          starttls:
            # 是否启用 STARTTLS
            enable: false
          ssl:
            # 是否启用 SSL 直连
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 3s

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  # 是否允许从请求头读取 token
  is-read-header: true
  # 是否允许从请求体读取 token
  is-read-body: true
  # 是否允许从 Cookie 读取 token
  is-read-cookie: false

mybatis-plus:
  # 是否启用逻辑删除
  enable-logic-delete: true
  global-config:
    db-config:
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  api-prefix: /api/v1
  blog-title: My Personal Blog
  rag:
    # 是否启用 RAG 功能
    enabled: true
    # embedding 检索模式：demo / siliconflow
    embedding-provider: demo
    api-url: https://api.siliconflow.cn/v1/chat/completions
    embedding-api-url: https://api.siliconflow.cn/v1/embeddings
    api-key: ${SILICONFLOW_API_KEY:}
    model: Qwen/Qwen3-32B
    embedding-model: Qwen/Qwen3-Embedding-8B
    temperature: 0
    max-tokens: 1024
    connect-timeout-seconds: 30
    read-timeout-seconds: 60
    demo-embedding-dimension: 64
    system-prompt: You are a professional ecommerce support assistant. Keep answers concise.
    milvus:
      enabled: false
      uri: http://127.0.0.1:19530
      token: ""
      database-name: ""
      collection-name: rag_demo_chunks
  member:
    auth:
      session-ttl-seconds: 86400
      verify-code-ttl-seconds: 120
      verify-code-send-interval-seconds: 60
      image-captcha-ttl-seconds: 120
      image-captcha-length: 4
      # 是否启用图形验证码校验
      image-captcha-enabled: true
      # 是否打印验证码明文日志
      plain-verify-code-log-enabled: true
      # 是否允许返回 mock 验证码
      allow-mock-verify-code: false
      mock-verify-code: 123456
      # 是否允许明文密码兼容登录
      allow-plain-password: true
    sms:
      aliyun:
        # 是否启用阿里云短信发送
        enabled: false
        access-key-id: ""
        access-key-secret: ""
        region-id: cn-hangzhou
        endpoint: dysmsapi.aliyuncs.com
        sign-name: ""
        login-template-code: ""
        code-param-name: code
        ttl-minutes-param-name: ttl
    email:
      login-subject: Login verification code
      login-content-template: "Your verification code is %s. It is valid for %d minutes."
