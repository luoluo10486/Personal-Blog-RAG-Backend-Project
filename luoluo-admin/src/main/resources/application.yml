server:
  port: 8080

spring:
  application:
    name: luoluo-admin
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:mysql://localhost:3306/personnal-blog?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:465}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    protocol: ${SPRING_MAIL_PROTOCOL:smtp}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
          ssl:
            enable: ${SPRING_MAIL_SMTP_SSL_ENABLE:true}
          connectiontimeout: ${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${SPRING_MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${SPRING_MAIL_SMTP_WRITE_TIMEOUT:5000}
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 3s

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  is-read-header: true
  is-read-body: true
  is-read-cookie: false

mybatis-plus:
  enable-logic-delete: true
  global-config:
    db-config:
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  api-prefix: /api/v1
  blog-title: My Personal Blog
  rag:
    enabled: false
    top-k: 3
    retrieval-url: ""
    llm-url: ""
    api-key: ""
  member:
    auth:
      session-ttl-seconds: 86400
      verify-code-ttl-seconds: 120
      verify-code-send-interval-seconds: 60
      image-captcha-ttl-seconds: 120
      image-captcha-length: 4
      image-captcha-enabled: false
      allow-mock-verify-code: false
      mock-verify-code: 123456
      allow-plain-password: true
    sms:
      aliyun:
        enabled: false
        access-key-id: ""
        access-key-secret: ""
        region-id: cn-hangzhou
        endpoint: dysmsapi.aliyuncs.com
        sign-name: ""
        login-template-code: ""
        code-param-name: code
        ttl-minutes-param-name: ttl
    email:
      login-subject: 落落大王邮箱验证码
      login-content-template: 您的验证码是：%s，%d 分钟内有效，请勿泄露给他人。
