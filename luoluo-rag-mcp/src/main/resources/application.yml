spring:
  application:
    name: luoluo-rag-mcp
  ai:
    mcp:
      server:
        name: luoluo-rag-mcp
        version: 1.0.0
        type: SYNC
        stdio: true
        instructions: Luoluo standalone MCP server that exposes RAG retrieval, answer generation, and text chunking tools.
  main:
    web-application-type: none
    banner-mode: off

logging:
  file:
    name: ./logs/luoluo-rag-mcp.log
  level:
    root: OFF

app:
  ai:
    enabled: true
    connect-timeout-seconds: 30
    read-timeout-seconds: 60
    providers:
      siliconflow:
        type: siliconflow
        base-url: https://api.siliconflow.cn
        api-key: ${SILICONFLOW_API_KEY:}
        endpoints:
          chat: /v1/chat/completions
          embedding: /v1/embeddings
          rerank: /v1/rerank
      ollama:
        type: ollama
        base-url: http://localhost:11434
        api-key: ""
        endpoints:
          chat: /v1/chat/completions
          embedding: /api/embed
          rerank: /v1/rerank
    chat:
      default-model: siliconflow-chat
      deep-thinking-model: siliconflow-chat
      candidates:
        - id: siliconflow-chat
          provider: siliconflow
          model: Qwen/Qwen3-32B
          priority: 10
          supports-thinking: true
    embedding:
      default-model: siliconflow-embedding
      candidates:
        - id: siliconflow-embedding
          provider: siliconflow
          model: Qwen/Qwen3-Embedding-8B
          dimension: 1536
          priority: 10
    rerank:
      default-model: noop-rerank
      candidates:
        - id: noop-rerank
          provider: noop
          model: noop
          priority: 100
        - id: siliconflow-rerank
          provider: siliconflow
          model: BAAI/bge-reranker-v2-m3
          priority: 10
          enabled: false
    selection:
      failure-threshold: 2
      open-duration-ms: 30000
    stream:
      message-chunk-size: 5
      executor-threads: 4
  knowledge:
    enabled: true
    default-base-code: default
    jdbc:
      enabled: false
    vector:
      type: milvus
      milvus:
        enabled: true
        uri: http://127.0.0.1:19530
        token: ""
        database-name: ""
        collection-prefix: kb_
        consistency-level: BOUNDED
        nprobe: 16
      pg:
        enabled: false
        schema: public
        table-name: knowledge_chunk_vector
    defaults:
      collection-name: knowledge_default_store
      dimension: 1536
      metric-type: COSINE
      embedding-model: Qwen/Qwen3-Embedding-8B
      chat-model: Qwen/Qwen3-32B
      rerank-model: BAAI/bge-reranker-v2-m3
    chunking:
      strategy: structure-aware
      chunk-size: 800
      chunk-overlap: 120
      max-chunk-count: 1000
    search:
      top-k: 8
      top-k-multiplier: 3
      confidence-threshold: 0.6
      rrf-k: 60
      rerank:
        enabled: true
        provider: demo
    trace:
      enabled: true
      max-error-length: 1000
    providers:
      - id: siliconflow
        type: siliconflow
        base-url: https://api.siliconflow.cn
        api-key: ${SILICONFLOW_API_KEY:}
        endpoints:
          chat: /v1/chat/completions
          embedding: /v1/embeddings
          rerank: /v1/rerank
      - id: ollama
        type: ollama
        base-url: http://localhost:11434
        endpoints:
          chat: /v1/chat/completions
          embedding: /api/embed
          rerank: /v1/rerank
