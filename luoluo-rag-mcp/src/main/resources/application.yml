server:
  port: 9099

spring:
  application:
    name: ragent-mcp-server
  sql:
    init:
      mode: never
  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/ragent?client_encoding=UTF8}
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: ragent-mcp-server-producer

milvus:
  uri: http://localhost:19530

ai:
  providers:
    ollama:
      type: ollama
      base-url: http://localhost:11434
      api-key: ""
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
        rerank: /v1/rerank
    bailian:
      type: bailian
      base-url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        embedding: /v1/embeddings
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    siliconflow:
      type: siliconflow
      base-url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
        rerank: /v1/rerank
  selection:
    failure-threshold: 2
    open-duration-ms: 30000
  stream:
    message-chunk-size: 5
  chat:
    default-model: qwen3-max
    deep-thinking-model: qwen3-max
    candidates:
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true
        priority: 3
  embedding:
    default-model: qwen-emb-8b
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: 1536
        priority: 1
  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

rag:
  vector:
    type: pg
  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
    sse-timeout-ms: 300000
  query-rewrite:
    enabled: true
  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200
  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    summary-max-chars: 200
    title-max-length: 30
  mcp:
    servers:
      - name: default
        url: http://localhost:9099

app:
  knowledge:
    enabled: true
    default-base-code: default
    storage:
      bucket-prefix: knowledge
    vector:
      type: pgvector
      pg:
        enabled: true
        schema: public
        table-name: t_knowledge_vector
        collection-prefix: kb_
    defaults:
      collection-name: default
      dimension: 1536
      metric-type: COSINE
      embedding-model: Qwen/Qwen3-Embedding-8B
      chat-model: Qwen/Qwen3-32B
      rerank-model: BAAI/bge-reranker-v2-m3
    chunking:
      strategy: structure-aware
      chunk-size: 800
      chunk-overlap: 120
      max-chunk-count: 1000
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60
    search:
      top-k: 8
      top-k-multiplier: 3
      confidence-threshold: 0.6
      rrf-k: 60
      rerank:
        enabled: true
        provider: demo
    trace:
      enabled: true
      max-error-length: 1000
    providers:
      - id: siliconflow
        type: siliconflow
        base-url: https://api.siliconflow.cn
        api-key: ${SILICONFLOW_API_KEY:}
        endpoints:
          chat: /v1/chat/completions
          embedding: /v1/embeddings
          rerank: /v1/rerank
      - id: ollama
        type: ollama
        base-url: http://localhost:11434
        endpoints:
          chat: /v1/chat/completions
          embedding: /api/embed
          rerank: /v1/rerank
